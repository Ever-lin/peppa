<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 小猪佩奇英语学习</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(150deg,#FFE0EF 0%,#FFF4D6 55%,#E4F0FF 100%);
  min-height: 100vh;
  font-family: 'PingFang SC','Helvetica Neue',Arial,sans-serif;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.wrap { max-width: 480px; width: 100%; text-align: center; }
.pig { font-size: 72px; display: block; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
h1 { font-size: 22px; font-weight: 900; color: #C94F82; margin-bottom: 4px; }
.sub { font-size: 14px; color: #6B3F1A; margin-bottom: 28px; font-weight: 600; }
.ep-list { display: flex; flex-direction: column; gap: 10px; }
.ep-card {
  background: #fff;
  border: 2px solid #F4A7C3;
  border-radius: 14px;
  padding: 14px 18px;
  text-decoration: none;
  display: flex; align-items: center; gap: 14px;
  transition: all .2s;
}
.ep-card:hover { background: #FFF0F6; border-color: #C94F82; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(201,79,130,.15); }
.ep-num {
  width: 42px; height: 42px; border-radius: 10px;
  background: #C94F82; color: #fff;
  font-size: 12px; font-weight: 900;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  line-height: 1.2; text-align: center;
}
.ep-info { text-align: left; flex: 1; }
.ep-title { font-size: 15px; font-weight: 800; color: #1E1220; margin-bottom: 2px; }
.ep-sub { font-size: 12px; color: #5C3D5C; }
.ep-arrow { font-size: 18px; color: #C94F82; flex-shrink: 0; }
.ep-card.coming {
  opacity: .5; pointer-events: none; border-style: dashed;
}
.coming-badge {
  font-size: 10px; background: #EDD5E5; color: #C94F82;
  padding: 2px 8px; border-radius: 20px; font-weight: 700; margin-top: 2px; display: inline-block;
}
</style>
</head>
<body>
<div class="wrap">
  <span class="pig">🐷</span>
  <h1>小猪佩奇英语学习</h1>
  <div class="sub">Peppa Pig English Learning · 点击集数开始学习</div>

  <div class="ep-list">
    <a class="ep-card" href="s01e01.html">
      <div class="ep-num">S01<br>E01</div>
      <div class="ep-info">
        <div class="ep-title">Muddy Puddles · 泥坑</div>
        <div class="ep-sub">📖 台词 · 🔊 朗读 · 📝 语法 · 💬 句型 · ✨ 生词</div>
      </div>
      <span class="ep-arrow">→</span>
    </a>

    <a class="ep-card coming" href="#">
      <div class="ep-num">S01<br>E02</div>
      <div class="ep-info">
        <div class="ep-title">The Swimming Pool · 游泳池</div>
        <div class="ep-sub"><span class="coming-badge">即将更新</span></div>
      </div>
      <span class="ep-arrow">→</span>
    </a>

    <a class="ep-card coming" href="#">
      <div class="ep-num">S01<br>E03</div>
      <div class="ep-info">
        <div class="ep-title">Daddy Loses His Glasses · 爸爸找眼镜</div>
        <div class="ep-sub"><span class="coming-badge">即将更新</span></div>
      </div>
      <span class="ep-arrow">→</span>
    </a>

    <a class="ep-card coming" href="#">
      <div class="ep-num">S01<br>E04</div>
      <div class="ep-info">
        <div class="ep-title">Polly Parrot · 波利鹦鹉</div>
        <div class="ep-sub"><span class="coming-badge">即将更新</span></div>
      </div>
      <span class="ep-arrow">→</span>
    </a>
  </div>
</div>
</body>
</html>
